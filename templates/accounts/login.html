{% extends 'base.html' %}{% block title %}लॉग इन | चंदौली समाचार एक्सप्रेस{% endblock %}{% block content %}
<style>.auth-page{min-height:620px;display:grid;place-items:center;padding:55px 20px;background:radial-gradient(circle at 15% 10%,#d7192017,transparent 28%),#f4f7fb}.auth-card{width:min(460px,100%);overflow:hidden;border:1px solid #e0e6ee;border-radius:20px;background:#fff;box-shadow:0 22px 65px #101d3217}.auth-head{padding:32px;background:linear-gradient(135deg,#0b1a31,#1d3b68);color:#fff;text-align:center}.auth-logo{display:grid;place-items:center;width:55px;height:55px;margin:0 auto 13px;border-radius:15px;background:#d71920;font-size:25px;font-weight:800}.auth-head h1{margin:0 0 5px;font-size:28px}.auth-head p{margin:0;color:#cdd9ea}.auth-form{padding:30px 34px}.auth-form p{margin:0 0 18px}.auth-form label{display:block;margin-bottom:6px;color:#18263d;font-weight:800}.auth-form input{width:100%;border:1px solid #d8e0ea;border-radius:10px;background:#f8fafc;padding:13px 14px;font:inherit;outline:0}.auth-form input:focus{border-color:#d71920;background:#fff;box-shadow:0 0 0 4px #d7192012}.auth-form button{width:100%;border:0;border-radius:10px;padding:14px;background:linear-gradient(135deg,#e21d25,#b70f16);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.auth-form .errorlist{padding:10px 13px;border-radius:8px;background:#fff1f1;color:#b71920;list-style:none;font-size:13px}@media(max-width:520px){.auth-page{padding:30px 15px}.auth-form{padding:25px 22px}}</style>
<main class="auth-page"><section class="auth-card"><div class="auth-head"><div class="auth-logo">चं</div><h1>स्वागत है</h1><p>अपने अकाउंट में लॉग इन करें</p></div><form method="post" class="auth-form">{% csrf_token %}{{ form.as_p }}<button type="submit">लॉग इन करें</button></form></section></main>
{% endblock %}
