<style>
  .page-hero{position:relative;overflow:hidden;padding:68px 0;background:radial-gradient(circle at 85% 20%,rgba(215,25,32,.38),transparent 27%),linear-gradient(120deg,#07172e 0%,#14325c 64%,#8f1118 150%);color:#fff}
  .page-hero:before,.page-hero:after{content:"";position:absolute;pointer-events:none;transform:rotate(-22deg);border:1px solid rgba(255,255,255,.08)}
  .page-hero:before{width:380px;height:380px;right:-130px;top:-210px;border-width:50px}.page-hero:after{width:250px;height:250px;right:90px;bottom:-210px;border-width:28px}
  .page-hero .container{position:relative;z-index:1}.page-hero span{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:20px;background:rgba(215,25,32,.9);color:#fff;font-size:12px;font-weight:800;letter-spacing:.7px;text-transform:uppercase}.page-hero span:before{content:"";width:7px;height:7px;border-radius:50%;background:#fff}.page-hero h1{max-width:780px;margin:15px 0 8px;font-size:clamp(34px,4vw,52px);line-height:1.2;text-shadow:0 4px 18px rgba(0,0,0,.2)}.page-hero p{max-width:720px;margin:0;color:#dce7f6;font-size:18px;line-height:1.7}
  .content-page{width:min(920px,92%);margin:auto;padding:54px 0 72px}.prose{position:relative;padding:38px 42px;border:1px solid #e1e7ef;border-radius:18px;background:#fff;box-shadow:0 18px 55px rgba(15,29,50,.08);font-size:17px;line-height:1.9}.prose:before{content:"";position:absolute;left:0;top:35px;width:5px;height:70px;border-radius:0 5px 5px 0;background:#d71920}.prose h2{display:flex;align-items:center;gap:11px;margin:35px 0 10px;color:#101d32;font-size:25px;line-height:1.35}.prose h2:first-of-type{margin-top:0}.prose h2:before{content:"";flex:0 0 9px;width:9px;height:9px;border-radius:3px;background:#d71920;box-shadow:0 0 0 5px #d7192013}.prose p{margin:0 0 15px;color:#526174}.prose>p:first-child strong{display:inline-block;padding:7px 12px;border-radius:7px;background:#f1f5f9;color:#435168;font-size:13px}
  .founder-card{display:flex;align-items:center;gap:20px;margin:15px 0 25px;padding:24px;border:1px solid #dfe6ef;border-radius:14px;background:linear-gradient(135deg,#f8fafc,#fff)}.founder-avatar{display:grid;place-items:center;flex:0 0 76px;height:76px;border-radius:18px;background:linear-gradient(135deg,#101d32,#d71920);color:#fff;font-size:25px;font-weight:800;box-shadow:0 10px 24px #101d3230}.founder-card h3{margin:0 0 4px;font-size:24px}.founder-card p{margin:0 0 4px}.founder-card a,.contact-info a{color:#c8171e;font-weight:700}
  .contact-layout{display:grid;grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);gap:30px;width:min(1100px,92%);margin:auto;padding:54px 0 72px}.contact-layout h2{margin:0 0 8px;color:#101d32;font-size:28px}.contact-info{display:grid;grid-template-columns:1fr 1fr;align-content:start;gap:13px}.contact-info>h2{grid-column:1/-1}.info-card{position:relative;overflow:hidden;padding:18px 19px;border:1px solid #e1e7ef;border-radius:13px;background:#fff;box-shadow:0 9px 28px #101d320c}.info-card:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:#d71920}.info-card small{display:block;margin-bottom:5px;color:#748197;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.info-card strong,.info-card a{font-size:16px}.info-card p{margin:0;color:#526174;line-height:1.65}.contact-form{padding:32px 34px;border-radius:18px;background:#fff;border:1px solid #dfe6ef;box-shadow:0 18px 55px rgba(15,29,50,.09)}.contact-form>p{color:#68778a}.contact-form form>p{margin:0 0 17px}.contact-form label{display:block;margin-bottom:6px;color:#1d2b42;font-size:14px;font-weight:800}.contact-form input,.contact-form textarea{display:block;width:100%;border:1px solid #d7dfe9;border-radius:10px;background:#f8fafc;padding:13px 14px;color:#17253c;font:inherit;transition:.2s;outline:0}.contact-form textarea{min-height:145px;resize:vertical}.contact-form input:focus,.contact-form textarea:focus{border-color:#d71920;background:#fff;box-shadow:0 0 0 4px rgba(215,25,32,.09)}.contact-form button{width:100%;border:0;border-radius:10px;padding:14px 22px;background:linear-gradient(135deg,#e11c24,#b70f16);color:#fff;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 10px 22px rgba(215,25,32,.24);transition:.2s}.contact-form button:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(215,25,32,.3)}.contact-form .errorlist{margin:5px 0;padding:0;list-style:none;color:#c5161d;font-size:13px}
  footer{background:linear-gradient(135deg,#0b182d,#101f38)!important}.footer-grid{padding-bottom:10px}.footer-grid>div{min-width:0}.footer-grid h3{font-size:25px;color:#fff}.footer-grid h4{position:relative;margin-bottom:18px;color:#fff;font-size:18px}.footer-grid h4:after{content:"";display:block;width:38px;height:3px;margin-top:8px;border-radius:3px;background:#d71920}.footer-grid a{display:block;width:fit-content;padding:4px 0;color:#d9e4f2!important;transition:.18s}.footer-grid a:hover{color:#fff!important;transform:translateX(4px)}.footer-grid p{line-height:1.75}.copyright{color:#aebbcf}
  @media(max-width:800px){.page-hero{padding:44px 0}.page-hero h1{font-size:34px}.page-hero p{font-size:16px}.content-page{padding:34px 0 48px}.prose{padding:27px 23px;font-size:16px}.prose h2{font-size:22px}.contact-layout{grid-template-columns:1fr;padding:34px 0 50px}.contact-form{padding:25px 22px}.footer-grid{grid-template-columns:1fr!important}.founder-card{align-items:flex-start}}
  @media(max-width:520px){.contact-info{grid-template-columns:1fr}.contact-info>h2{grid-column:auto}.page-hero h1{font-size:29px}.prose{padding:24px 19px}.founder-avatar{flex-basis:62px;height:62px;border-radius:14px}}
</style>
<section class="page-hero"><div class="container"><span>चंदौली समाचार एक्सप्रेस</span><h1>{{ page_title }}</h1><p>{{ page_intro }}</p></div></section>
