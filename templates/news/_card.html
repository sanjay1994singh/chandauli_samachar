<article class="card"><a href="{{ a.get_absolute_url }}"><div class="card-img" {% if a.display_image %}style="background-image:url('{{ a.display_image }}')"{% endif %}><span>{{ a.category.name }}</span></div><div class="card-body"><h3>{{ a.title }}</h3><p>{{ a.summary|truncatewords:18 }}</p><small>{{ a.published_at|date:"d M Y" }}{% if a.city %} • {{ a.city.name }}{% endif %}</small></div></a></article>
